<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRiD 8.0 Winner</title>
  <!-- Google's model-viewer script -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"></script>
  <style>
    body { 
      margin: 0; 
      width: 100vw; 
      height: 100vh; 
      overflow: hidden; 
     background-image: url('https://imgur.com/xeGUrdn.png');
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;
    background-position: center;
}
    /* Container takes up the full viewport height */
.model-container {
  display: flex;
  justify-content: center; /* Horizontally centers the model */
  align-items: center;     /* Vertically centers the model */
  min-height: 100vh;       /* Sets container to full screen height */
}

/* Give the model viewer a specific size */
model-viewer {
  width: 40%;
  height: 200px;
}
    
  </style>
</head>
<body>
  
<div class="model-container">
  <model-viewer 
    src="./gold-trophy.glb" 
    ar 
    auto-rotate 
    camera-controls 
    shadow-intensity="1"
    alt="Winner Trophy">
  </model-viewer>
</div>

  
</body>
</html>
