<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Trophy</title>
  <!-- Google's model-viewer script -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    body { 
      margin: 0; 
      width: 100vw; 
      height: 100vh; 
      overflow: hidden; 
      background-color: #f4f4f4; 
    }
    model-viewer { 
      width: 100%; 
      height: 100%; 
    }
  </style>
</head>
<body>

  <model-viewer 
    src="./trophy.glb" 
    ar 
    auto-rotate 
    camera-controls 
    shadow-intensity="1"
    alt="3D Trophy">
  </model-viewer>

</body>
</html>
